<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D0A; --surface:#14160F; --surface-2:#1B1D15;
    --line: rgba(237,234,226,0.08); --text:#EDEAE2; --muted:#8A8578;
    --ember:#FF4A1C; --amber:#FFB020; --zone:#6C4FF2; --safe:#4ADE80;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:#000; font-family:'Inter', sans-serif; color:var(--text);}
  .display{font-family:'Rajdhani', sans-serif; font-weight:700;}
  .app{max-width:480px; margin:0 auto; background:var(--bg); min-height:100vh; padding-bottom:78px; position:relative;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  svg{display:block;}

  /* 1. TOP BAR */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--surface); border-bottom:1px solid var(--line);}
  .topbar-left{display:flex; align-items:center; gap:12px;}
  .avatar{width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg, var(--zone), var(--ember)); display:flex; align-items:center; justify-content:center; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:18px;}
  .username{font-family:'Rajdhani',sans-serif; font-weight:600; font-size:20px;}
  .topbar-right{display:flex; align-items:center; gap:12px;}
  .wallet{display:flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:4px 12px 4px 4px;}
  .wallet-coin{width:24px; height:24px; border-radius:50%; background:var(--amber); color:#0B0D0A; display:flex; align-items:center; justify-content:center; font-size:14px;}
  .wallet-amt{font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--amber);}
  .bell{position:relative; width:40px; height:40px; border-radius:50%; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center;}
  .bell-dot{position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--ember);}

  /* 2. RULES BANNER */
  .rules-banner{width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface-2); border-bottom:1px solid var(--line); text-align:left;}
  .rules-icon{flex-shrink:0; width:36px; height:36px; border-radius:6px; background:rgba(237,234,226,0.06); display:flex; align-items:center; justify-content:center;}
  .rules-text{font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  /* 3. PROMO CAROUSEL */
  .promo-wrap{padding:16px;}
  .promo-card{position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--line); background:linear-gradient(135deg, var(--surface-2), var(--surface), var(--bg)); padding:24px; min-height:170px; display:flex; flex-direction:column; justify-content:space-between;}
  .ring-decor{position:absolute; border-radius:50%; pointer-events:none;}
  .ring1{width:160px; height:160px; right:-40px; top:-40px; border:1px solid rgba(108,79,242,0.2);}
  .ring2{width:96px; height:96px; right:-16px; top:-16px; border:1px solid rgba(255,74,28,0.25);}
  .promo-eyebrow{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--amber); margin-bottom:6px;}
  .promo-title{font-family:'Rajdhani',sans-serif; font-weight:700; font-size:26px; line-height:1.1; margin-bottom:4px;}
  .promo-sub{font-size:13px; color:var(--muted);}
  .promo-actions{display:flex; align-items:center; justify-content:space-between; margin-top:16px; position:relative; z-index:1;}
  .promo-cta{background:var(--zone); color:var(--text); font-size:14px; font-weight:500; padding:10px 20px; border-radius:999px;}
  .promo-send{width:40px; height:40px; border-radius:50%; background:rgba(108,79,242,0.2); border:1px solid rgba(108,79,242,0.4); display:flex; align-items:center; justify-content:center;}
  .dots{display:flex; justify-content:center; gap:6px; margin-top:12px;}
  .dot{height:6px; border-radius:999px; background:var(--line); width:6px; transition:.2s;}
  .dot.active{width:20px; background:var(--ember);}

  /* 4. MY MATCHES */
  .section{padding:28px 16px 0;}
  .section-title{font-family:'Rajdhani',sans-serif; font-weight:600; font-size:20px; margin-bottom:14px;}
  .matches-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .match-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:20px 8px; display:flex; flex-direction:column; align-items:center; gap:10px;}
  .match-icon{width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center;}
  .match-icon.ongoing{background:rgba(74,222,128,0.15); color:var(--safe);}
  .match-icon.upcoming{background:rgba(108,79,242,0.15); color:var(--zone);}
  .match-icon.completed{background:rgba(255,176,32,0.15); color:var(--amber);}
  .match-label{font-size:14px; font-weight:500;}

  /* 5. ESPORTS GAMES */
  .games-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding-bottom:12px;}
  .game-card{position:relative; border-radius:12px; overflow:hidden; aspect-ratio:4/3; padding:14px; display:flex; flex-direction:column; justify-content:space-between; text-align:left;}
  .game-card.c1{background:linear-gradient(135deg, var(--ember), #7A1F0A);}
  .game-card.c2{background:linear-gradient(135deg, var(--zone), #2E1A6B);}
  .game-card.c3{background:linear-gradient(135deg, var(--amber), #7A4B00);}
  .game-card.c4{background:linear-gradient(135deg, var(--safe), #0F5A32);}
  .game-sub{font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; text-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .game-title{font-family:'Rajdhani',sans-serif; font-weight:700; font-size:21px; line-height:1.15; text-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .game-footer{display:flex; align-items:center; justify-content:space-between;}
  .game-category{font-size:11px; font-weight:600; letter-spacing:0.04em; color:rgba(237,234,226,0.9); text-shadow:0 1px 4px rgba(0,0,0,0.4);}
  .game-live{display:flex; align-items:center; gap:5px; font-size:11px; background:rgba(0,0,0,0.3); border-radius:999px; padding:2px 8px; color:rgba(237,234,226,0.9);}
  .live-dot{width:6px; height:6px; border-radius:50%; background:var(--safe);}

  /* 6. BOTTOM NAV */
  .bottomnav{position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; display:flex; background:var(--surface); border-top:1px solid var(--line); padding:8px;}
  .nav-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; color:var(--muted);}
  .nav-item.active{color:var(--text);}
  .nav-item.active svg{color:var(--ember); stroke:var(--ember);}
  .nav-label{font-size:11px;}
  .nav-underline{width:16px; height:2px; border-radius:2px; background:var(--ember); margin-top:2px;}
</style>
</head>
<body>

<div class="app">

  <!-- 1. TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="avatar">P</div>
      <span class="username">Piyush</span>
    </div>
    <div class="topbar-right">
      <div class="wallet">
        <span class="wallet-coin">₹</span>
        <span class="wallet-amt">57</span>
      </div>
      <div class="bell">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="bell-dot"></span>
      </div>
    </div>
  </div>

  <!-- 2. RULES BANNER -->
  <button class="rules-banner">
    <span class="rules-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A8578" stroke-width="2"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
    </span>
    <span class="rules-text">CLICK HERE TO READ ALL THE RULES 📌 Every player of Free Fire...</span>
  </button>

  <!-- 3. PROMO CAROUSEL -->
  <div class="promo-wrap">
    <div class="promo-card">
      <div class="ring-decor ring1"></div>
      <div class="ring-decor ring2"></div>
      <div style="position:relative; z-index:1;">
        <div class="promo-eyebrow">Support · 10AM to 10PM</div>
        <div class="promo-title">Need Help Fast?</div>
        <div class="promo-sub">Our team replies to every ticket within minutes.</div>
      </div>
      <div class="promo-actions">
        <button class="promo-cta">Contact Support</button>
        <span class="promo-send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6C4FF2" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </span>
      </div>
    </div>
    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- 4. MY MATCHES -->
  <div class="section">
    <div class="section-title">My Matches</div>
    <div class="matches-grid">
      <button class="match-card">
        <span class="match-icon ongoing">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </span>
        <span class="match-label">Ongoing</span>
      </button>
      <button class="match-card">
        <span class="match-icon upcoming">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </span>
        <span class="match-label">Upcoming</span>
      </button>
      <button class="match-card">
        <span class="match-icon completed">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
        </span>
        <span class="match-label">Completed</span>
      </button>
    </div>
  </div>

  <!-- 5. ESPORTS GAMES -->
  <div class="section">
    <div class="section-title">Esports Games</div>
    <div class="games-grid">
      <button class="game-card c1">
        <div>
          <div class="game-sub">Free Fire</div>
          <div class="game-title">Solo Survival Tournaments</div>
        </div>
        <div class="game-footer">
          <span class="game-category">BR SURVIVAL</span>
          <span class="game-live"><span class="live-dot"></span>0</span>
        </div>
      </button>
      <button class="game-card c2">
        <div>
          <div class="game-sub">Free Fire</div>
          <div class="game-title">BR Full Map Tournaments</div>
        </div>
        <div class="game-footer">
          <span class="game-category">BR FULL MAP</span>
          <span class="game-live"><span class="live-dot"></span>0</span>
        </div>
      </button>
      <button class="game-card c3">
        <div>
          <div class="game-sub">Free Fire</div>
          <div class="game-title">Clash Squad 1v1 Tournaments</div>
        </div>
        <div class="game-footer">
          <span class="game-category">CLASH SQUAD</span>
          <span class="game-live"><span class="live-dot"></span>0</span>
        </div>
      </button>
      <button class="game-card c4">
        <div>
          <div class="game-sub">Free Fire</div>
          <div class="game-title">Lone Wolf 1v1 Tournaments</div>
        </div>
        <div class="game-footer">
          <span class="game-category">LONE WOLF</span>
          <span class="game-live"><span class="live-dot"></span>0</span>
        </div>
      </button>
    </div>
  </div>

  <!-- 6. BOTTOM NAV -->
  <div class="bottomnav">
    <div class="nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span class="nav-label">Earn</span>
    </div>
    <div class="nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M17 4h3a2 2 0 0 1 2 2 5 5 0 0 1-5 5M7 4H4a2 2 0 0 0-2 2 5 5 0 0 0 5 5"/></svg>
      <span class="nav-label">Leaderboard</span>
    </div>
    <div class="nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span class="nav-label">Home</span>
      <span class="nav-underline"></span>
    </div>
    <div class="nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      <span class="nav-label">Menu</span>
    </div>
  </div>

</div>

</body>
</html>
